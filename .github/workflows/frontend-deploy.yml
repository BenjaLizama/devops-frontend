name: Frontend CI/CD Pipeline to EKS

on:
  push:
    branches:
      - deploy

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      # 1. Autenticarse en AWS usando tus secrets de AWS Academy
      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }} # Crucial para AWS Academy
          aws-region: us-east-1

      # 2. Login automático en tu Amazon ECR (Reemplaza por completo a Docker Hub)
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 3. Construir la imagen apuntando al repositorio ECR de tu frontend
      - name: Build and Push Docker Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          # Usamos el nombre del repositorio que creó tu plantilla de CloudFormation
          ECR_REPOSITORY: tienda-frontend
          IMAGE_TAG: v1.0.0
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  deploy-to-eks:
    needs: build-and-publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código (Para leer los manifiestos K8s)
        uses: actions/checkout@v4

      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      # 4. Conectarse al clúster de Kubernetes en vez de la máquina EC2
      - name: Actualizar Kubeconfig para EKS
        run: |
          aws eks update-kubeconfig --name devopseks --region us-east-1

      # 5. Aplicar los cambios en el clúster y forzar la descarga de la nueva imagen
      - name: Desplegar en EKS
        run: |
          kubectl apply -f kubernetes/frontend-deployment.yaml
          kubectl apply -f kubernetes/tienda-frontend-hpa.yaml
          kubectl rollout restart deployment/tienda-frontend
