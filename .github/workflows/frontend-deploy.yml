name: Frontend CI/CD Pipeline

on:
  push:
    branches:
      - deploy

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/innovatech-frontend:latest

  deploy-to-ec2:
    needs: build-and-publish
    runs-on: ubuntu-latest
    steps:
      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Ejecutar comandos de Docker vía AWS SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.AWS_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "docker pull ${{ secrets.DOCKERHUB_USERNAME }}/innovatech-frontend:latest",
              "docker stop innovatech_frontend || true",
              "docker rm innovatech_frontend || true",
              "docker run -d --name innovatech_frontend -p 80:80 --restart always ${{ secrets.DOCKERHUB_USERNAME }}/innovatech-frontend:latest"
            ]' \
            --comment "Despliegue automático de Frontend desde GitHub Actions"
