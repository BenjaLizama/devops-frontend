server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 🔄 Redirección para Ventas usando el Service DNS de K8s
    location /api/v1/ventas {
        proxy_pass http://ms-venta-service:8081; # ⬅️ Usa el NOMBRE del servicio, NO la IP
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 🔄 Redirección para Despachos usando el Service DNS de K8s
    location /api/v1/despachos {
        proxy_pass http://ms-despacho-service:8080; # ⬅️ Usa el NOMBRE del servicio, NO la IP
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}